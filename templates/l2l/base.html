<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrueSkills{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* ── ND-friendly cream palette (BDA-compliant) ── */
            --bg:          #F7F3E9;
            --bg2:         #FEFCF6;
            --bg3:         #F0EBE0;
            --border:      rgba(42,37,32,0.12);
            --border-md:   rgba(42,37,32,0.2);
            --text:        #2A2520;
            --muted:       #6B6056;
            --dim:         #9A8878;

            /* ── Brand / interactive ── */
            --leo:         #2D4A6B;
            --leo-light:   #4A7AAB;
            --leo-soft:    #D6E8F7;
            --accent:      #2D4A6B;

            /* ── Semantic ── */
            --diamond:     #E8A825;
            --diamond-bg:  #FEF6E4;
            --correct:     #3A7A52;
            --correct-bg:  #E8F5EE;
            --retry:       #C85A2A;
            --retry-bg:    #FCEEE8;
            --purple:      #6B4EA8;
            --purple-bg:   #F0ECFA;

            --radius: 10px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--leo); text-decoration: none; }
        a:hover { color: var(--leo-light); text-decoration: underline; }

        input, textarea, select {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            padding: 12px 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--leo-light);
            background: var(--bg2);
        }

        input::placeholder, textarea::placeholder { color: var(--dim); }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field { margin-bottom: 18px; }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: 'Nunito', sans-serif;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn:hover { opacity: 0.88; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: var(--leo); color: #fff; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border-md); }
        .btn-diamond { background: var(--diamond-bg); color: #7a5200; border: 1.5px solid rgba(232,168,37,0.3); font-weight: 800; }
        .btn-block { width: 100%; text-align: center; }

        .card {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 24px;
        }

        .error-msg {
            background: var(--retry-bg);
            border: 1.5px solid rgba(200,90,42,0.25);
            color: var(--retry);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 18px;
        }

        .success-msg {
            background: var(--correct-bg);
            border: 1.5px solid rgba(58,122,82,0.25);
            color: var(--correct);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 18px;
        }

        nav.topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1.5px solid var(--border);
            background: var(--bg2);
        }

        .logo {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--leo);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 30px; height: 30px;
            background: var(--leo);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }

        .diamond-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--diamond-bg);
            border: 1.5px solid rgba(232,168,37,0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.88rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #7a5200;
        }

        .page-center {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-wide {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        h1 { font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        h2 { font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        p { color: var(--muted); line-height: 1.65; }

        .divider {
            border: none;
            border-top: 1.5px solid var(--border);
            margin: 24px 0;
        }

        /* TRIAL BANNER */
        .trial-banner {
            background: var(--leo-soft);
            border-bottom: 1.5px solid rgba(45,74,107,0.2);
            text-align: center;
            padding: 10px 16px;
            font-size: 0.88rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: var(--leo);
            letter-spacing: 0.2px;
        }

        .trial-banner strong { color: var(--leo); font-weight: 800; }

        .trial-banner a {
            color: var(--leo);
            text-decoration: underline;
            margin-left: 8px;
            font-weight: 700;
        }

        /* SUBJECT PILLS */
        .subject-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg2);
            color: var(--muted);
            font-size: 0.88rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .subject-pill:hover, .subject-pill.active {
            border-color: var(--leo-light);
            color: var(--leo);
            background: var(--leo-soft);
        }

        /* STREAK PILL */
        .streak-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--purple-bg);
            border: 1.5px solid rgba(107,78,168,0.2);
            border-radius: 14px;
            padding: 5px 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--purple);
        }

        @media (max-width: 600px) {
            .page-center { padding: 24px 16px; }
            .page-wide { padding: 20px 16px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<!-- TRIAL BANNER -->
<div class="trial-banner">
    🎉 <strong>Free Easter Trial</strong> — TrueSkills is completely free right now. No card, no catch.
    <a href="/register">Start for free →</a>
</div>

{% block body %}{% endblock %}
</body>
</html>
