steps:
  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/trueskills-l2l', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/trueskills-l2l']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trueskills-l2l'
      - '--image'
      - 'gcr.io/$PROJECT_ID/trueskills-l2l'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=${_GOOGLE_API_KEY},GEMINI_MODEL=gemini-2.5-flash,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio,DATABASE_URL=${_DATABASE_URL},SECRET_KEY=${_SECRET_KEY},ADMIN_EMAIL=${_ADMIN_EMAIL},ADMIN_PASSWORD=${_ADMIN_PASSWORD}'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '300'

substitutions:
  _REGION: europe-west2
  _GOOGLE_API_KEY: ''
  _DATABASE_URL: ''
  _SECRET_KEY: ''
  _ADMIN_EMAIL: ''
  _ADMIN_PASSWORD: ''

images:
  - 'gcr.io/$PROJECT_ID/trueskills-l2l'
